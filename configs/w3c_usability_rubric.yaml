version: 1
source:
  standards:
  - wcag20
  - wcag21
  - wcag22
  - wcag30
  urls:
  - https://www.w3.org/TR/WCAG20/
  - https://www.w3.org/TR/WCAG21/
  - https://www.w3.org/TR/WCAG22/
  - https://www.w3.org/TR/wcag-3.0/
  builder: standards.W3CUsabilitySpecBuilder
labeling:
  default_strategy: w3c_static_ui_heuristic
  binary_threshold: 3
  output_dir: outputs/labels/weak_labels
criteria:
  visual_perceivability:
    weight: 0.24
    name: Visual Perceivability
    observability: partial
    measurable_signals:
    - text_count
    - image_count
    - layout_density
    - whitespace_ratio
    - component_bounds
    source_signal_count: 48
    source_coverage:
      wcag20: 4
      wcag21: 12
      wcag22: 14
      wcag30: 18
  operable_navigation:
    weight: 0.24
    name: Operable Navigation and Touch Interaction
    observability: partial
    measurable_signals:
    - clickable_count
    - button_count
    - component_density
    - touch_target_bounds
    - focus_or_action_label_presence
    source_signal_count: 92
    source_coverage:
      wcag20: 4
      wcag21: 17
      wcag22: 20
      wcag30: 51
  understandable_labels:
    weight: 0.24
    name: Understandable Labels and Structure
    observability: partial
    measurable_signals:
    - text_ratio
    - input_count
    - labeled_input_presence
    - component_type_distribution
    source_signal_count: 68
    source_coverage:
      wcag20: 3
      wcag21: 16
      wcag22: 16
      wcag30: 33
  robust_semantics:
    weight: 0.18
    name: Robust Semantic Compatibility
    observability: partial
    measurable_signals:
    - component_class
    - component_label
    - text
    - clickable
    - enabled
    - hierarchy_depth
    source_signal_count: 26
    source_coverage:
      wcag20: 2
      wcag21: 11
      wcag22: 11
      wcag30: 2
  runtime_or_process_only:
    weight: 0.1
    name: Runtime or Process-only Constraints
    observability: not_directly_observable
    measurable_signals: []
    source_signal_count: 79
    source_coverage:
      wcag20: 3
      wcag21: 18
      wcag22: 20
      wcag30: 38
heuristic_thresholds:
  high_density: 8.0e-05
  high_complexity: 1.3
  low_whitespace: 0.25
  excessive_text_ratio: 0.45
  minimum_score: 1
  maximum_score: 5
disclosure: This rubric is built by crawling W3C WCAG source documents and mapping
  observable sections to Rico static screenshot/hierarchy signals. It is a weak usability
  proxy, not a WCAG conformance test.
